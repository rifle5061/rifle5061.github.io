name: Update race-data.json

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "YYYYMMDD。空欄なら日本時間の今日"
        required: false
        default: ""
  schedule:
    - cron: "0 22 * * *"

permissions:
  contents: write

jobs:
  update-race-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install libraries
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Build race-data.json
        env:
          TARGET_DATE: ${{ github.event.inputs.target_date }}
        run: |
          python scripts/build_race_data.py

      - name: Commit race-data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add race-data.json debug-race-data.txt debug-source-snippets.txt
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update race-data.json"
            git push
          fi
