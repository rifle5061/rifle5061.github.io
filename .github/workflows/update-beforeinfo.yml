name: Update beforeinfo

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "YYYYMMDD。空欄なら日本時間の今日"
        required: false
        default: ""
  schedule:
    - cron: "*/30 23,0-13 * * *"

permissions:
  contents: write

jobs:
  update-beforeinfo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install libraries
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Update beforeinfo
        env:
          TARGET_DATE: ${{ github.event.inputs.target_date }}
        run: |
          python scripts/update_beforeinfo.py

      - name: Commit beforeinfo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add race-data.json debug-beforeinfo.txt
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update beforeinfo"
            git push
          fi
